name: CI

on:
  pull_request:
  push:

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Install test dependencies
        run: uv sync --dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Run Mypy
        run: uv run mypy src tests

      - name: Run pytest with coverage
        run: uv run pytest --cov=slidev_linter --cov-report=term-missing --cov-report=xml

      - name: Upload coverage.xml artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

  cli-output-contract:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Prepare fixture workspace
        shell: bash
        run: |
          uv sync --dev
          rm -rf ci
          mkdir -p ci/slides
          cp fixtures/[0-9][0-9]-*.md ci/slides/

      - name: Check mode detects all issues and output format
        shell: bash
        run: |
          set -euo pipefail
          set +e
          uv run python -m slidev_linter check all --slides-dir ci/slides | tee ci_check_before.txt
          rc_before=$?
          set -e
          test "$rc_before" -eq 1

          grep -F "❌ Would apply modifications to ci/slides/01-bold-title.md" ci_check_before.txt
          grep -F "❌ Would apply modifications to ci/slides/02-default-transition.md" ci_check_before.txt
          grep -F "❌ Would apply modifications to ci/slides/03-section-transition.md" ci_check_before.txt
          grep -F "❌ Would apply modifications to ci/slides/04-title-subtitle.md" ci_check_before.txt
          grep -F "❌ Would apply modifications to ci/slides/05-spacing-after-title.md" ci_check_before.txt
          grep -F "Summary: 5/5 files need changes." ci_check_before.txt

      - name: Apply fixes
        run: uv run python -m slidev_linter lint all --slides-dir ci/slides | tee ci_fix.txt

      - name: Validate final formatted output
        shell: bash
        run: |
          set -euo pipefail
          for expected in fixtures/expected/*.md; do
            actual="ci/slides/$(basename "$expected")"
            diff -u "$expected" "$actual"
          done

      - name: Re-check is clean
        shell: bash
        run: |
          set -euo pipefail
          set +e
          uv run python -m slidev_linter check all --slides-dir ci/slides | tee ci_check_after.txt
          rc_after=$?
          set -e
          test "$rc_after" -eq 0
          grep -F "Summary: 0/5 files need changes." ci_check_after.txt
